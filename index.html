<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalEngine / TGR Documentation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --hover-bg: rgba(88, 166, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header i {
            font-size: 24px;
            color: var(--accent-blue);
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .nav-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 24px 0 8px 0;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin: 2px 0;
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .nav-links a:hover {
            background-color: var(--hover-bg);
            color: var(--accent-blue);
        }

        .nav-links a i {
            width: 16px;
            text-align: center;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 48px;
            max-width: 900px;
        }

        .hero {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        .hero h2 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* 手机端：sidebar 不再隐藏，改成顶部横向区块 */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .main-content {
                margin-left: 0;
                padding: 24px;
            }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <i class="fas fa-satellite-dish"></i>
        <h1>SignalEngine</h1>
    </div>

    <div class="nav-links">
        <div class="nav-section-title">Documentation</div>
        <a href="./README.md"><i class="fas fa-book"></i> README</a>
        <a href="./Signal%20for%20LLM.md"><i class="fas fa-file-alt"></i> Signal for LLM</a>
    </div>
</aside>

<main class="main-content">
    <section class="hero">
        <h2>SignalEngine / TGR</h2>
        <p>
            Documentation hub for Signal Engineering and the TGR<br>
            (Thixotropic Generative Recursion) framework.
        </p>
    </section>

    <div style="color: var(--text-secondary); font-size: 14px; text-align: center; margin-top: 60px;">
        Powered by GitHub Pages & Termux
    </div>
</main>

</body>
</html>
